<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Biblioteca Pessoal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style2.css">
</head>
<body class="login-page">
    <div class="login-container d-flex align-items-center justify-content-center w-100 h-100">
        <div class="form-wrapper" style="max-width: 450px; background: white; padding: 30px; border-radius: 10px;">
            <div class="form-header text-center mb-4">
                <h2>Nova Senha</h2>
                <p>Crie uma nova senha para sua conta</p>
            </div>

            <form id="formRedefinirSenha">
                <div class="form-group mb-3">
                    <label for="novaSenha" class="form-label">Nova Senha</label>
                    <input type="password" id="novaSenha" class="form-control" placeholder="Digite a nova senha" required>
                </div>
                <button type="submit" class="btn-login w-100 mt-3">Salvar Nova Senha</button>
            </form>

            <div id="mensagemRedefinir" class="mt-4 text-center"></div>
        </div>
    </div>
    <script src="../js/redefinir_senha.js"></script>
</body>
</html>

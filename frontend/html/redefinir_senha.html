<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Biblioteca Pessoal</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        
        <div class="login-form-container" style="flex: 1; background: transparent;">
            <div class="form-wrapper" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px var(--sombra);">
                
                <div class="form-header">
                    <h2>Nova Senha</h2>
                    <p>Crie uma nova senha para sua conta</p>
                </div>

                <form id="formRedefinirSenha">
                    <div class="form-group">
                        <label for="novaSenha"><i class="fas fa-lock"></i> Nova Senha</label>
                        <div class="input-with-icon">
                            <input type="password" id="novaSenha" class="form-control" placeholder="Digite a nova senha" required>
                            <i class="fas fa-key input-icon"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login" style="margin-top: 20px;">Salvar Nova Senha</button>
                </form>

                <div id="mensagemRedefinir" style="margin-top: 20px; text-align: center;"></div>
                
                <div class="signup-link" style="margin-top: 30px; border-top: none;">
                    <a href="../../index.html" style="font-weight: 500;"><i class="fas fa-arrow-left"></i> Voltar ao Login</a>
                </div>
            </div>
        </div>
        
    </div>
    <script src="../js/redefinir_senha.js"></script>
</body>
</html>

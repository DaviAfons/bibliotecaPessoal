<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Biblioteca Pessoal</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">

    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fas fa-book-reader"></i>
            <span>Minha Biblioteca</span>
        </div>

        <button class="navbar-toggle" onclick="toggleMenu()" aria-label="Abrir menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="navbar-menu" id="navMenu">
            <a href="biblioteca.html" class="nav-item">
                <i class="fas fa-arrow-left"></i> 
                <span class="link-text">Voltar aos Livros</span>
            </a>

            <a href="../../index.html" onclick="logout()" class="nav-item" title="Sair">
                <i class="fas fa-sign-out-alt"></i> 
                <span class="mobile-only">Sair</span>
            </a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="form-header" style="text-align: center; margin-bottom: 30px;">
                <h2>Editar Perfil</h2>
                <p>Personalize como aparece na sua biblioteca</p>
            </div>

            <div id="mensagem" class="alert"></div>

            <form id="perfilForm">
                
                <div class="profile-header">
                    <div class="avatar-wrapper">
                        <img src="../img/default-avatar.png" id="avatarPreview" class="avatar-img" alt="Foto de Perfil" onerror="this.src='https://ui-avatars.com/api/?name=User&background=efe7dd&color=5a1a1b'">
                        
                        <label for="fotoInput" class="avatar-upload-btn" title="Alterar foto">
                            <i class="fas fa-camera"></i>
                        </label>
                        <input type="file" id="fotoInput" name="foto" accept="image/*">
                    </div>
                    <p>Clique na câmara para alterar</p>
                </div>

                <div class="form-group">
                    <label for="nome">
                        <i class="fas fa-user"></i> Nome Completo
                    </label>
                    <div class="input-with-icon">
                        <input type="text" id="nome" name="nome" class="form-control" required>
                        <i class="fas fa-pen input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">
                        <i class="fas fa-quote-right"></i> Biografia / Sobre mim
                    </label>
                    <textarea id="bio" name="bio" class="form-control" placeholder="Escreva um pouco sobre os seus gostos literários..."></textarea>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-login">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                </div>

            </form>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-info">
    <p>&copy; 2026 Biblioteca Pessoal. Todos os direitos reservados.</p>
    <p class="credits">
        <b>&copy; Desenvolvido por Davi Afonso & Sofia Tresse Pires</b>
        <br>
        <a href="sobre.html" style="color: var(--dourado); text-decoration: none; display: inline-block; margin-top: 8px;">
            <i class="fas fa-info-circle"></i> Conheça a nossa história
        </a>
    </p>
</div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('active');
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../../index.html';
        }
    </script>

    <script src="../js/perfil.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca - Organização Literária</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/biblioteca.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-page">

    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fas fa-book"></i>
            <span>Minha Biblioteca</span>
        </div>

        <button class="navbar-toggle" id="navbarToggle" aria-label="Abrir menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="navbar-menu" id="navMenu">
            <a href="favoritos.html" class="nav-item">
                <i class="fas fa-heart"></i> <span class="link-text">Favoritos</span>
            </a>

            <a href="perfil.html" class="nav-item user-profile-link" title="Editar Perfil">
                <img src="../img/default-avatar.png" id="navAvatar" class="nav-avatar" alt="Avatar"
                    onerror="this.src='https://ui-avatars.com/api/?name=User&background=efe7dd&color=5a1a1b'">
                <span id="navNome">Carregando...</span>
            </a>

            <a href="../../index.html" id="logoutLink" class="nav-item" title="Sair">
                <i class="fas fa-sign-out-alt"></i> <span class="mobile-only">Sair</span>
            </a>
        </div>
    </nav>

    <div class="container">

        <header class="content-header">
            <div class="welcome">
                <h1>Olá, <span id="userName">Leitor</span>!</h1>
                <p>Como vai sua leitura hoje?</p>
            </div>

            <div class="header-actions">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="inputBusca" placeholder="Pesquisar por título ou autor...">
                </div>

                <button id="btnNovoLivro" class="btn-add-book">
                    <i class="fas fa-plus-circle"></i> Novo Livro
                </button>
            </div>
        </header>

        <section class="stats">
            <div class="box">
                <i class="fas fa-check-double"></i>
                <div class="info">
                    <h3>0</h3>
                    <p>Livros Lidos</p>
                </div>
            </div>
            <div class="box">
                <i class="fas fa-book-reader"></i>
                <div class="info">
                    <h3>0</h3>
                    <p>Lendo Agora</p>
                </div>
            </div>
        </section>

        <section class="book-grid"></section>
    </div>

    <div id="modalLivro" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-book-medical"></i> Novo Livro</h3>
                <span class="close" id="btnFecharModal">&times;</span>
            </div>

            <form id="formLivro">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" required placeholder="Ex: O Alquimista">
                </div>
                <div class="form-group">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" required placeholder="Ex: Paulo Coelho">
                </div>

                <div class="form-group">
                    <label for="ano">Ano da Leitura</label>
                    <input type="number" id="ano">
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="nao_lido">Não Lido</option>
                        <option value="lendo">Lendo</option>
                        <option value="lido">Lido</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="inputFoto">Capa do Livro (Upload)</label>
                    <input type="file" id="inputFoto" accept="image/*">
                    <input type="hidden" id="imagem">
                    <img id="previewImagem" src="" style="display: none;">
                </div>

                <div class="form-group full-width">
                    <label>Gêneros</label>
                    <div id="generos-checkboxes" class="generos-checkbox-grid"></div>
                </div>

                <div class="form-group full-width">
                    <label for="descricao">Resumo / Resenha</label>
                    <textarea id="descricao" rows="2" placeholder="Breve resumo ou resenha da obra..."></textarea>
                </div>

                <div class="form-group">
                    <label>Avaliação</label>
                    <div class="rating-input small-rating">
                        <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                        <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                        <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                        <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                        <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-save">Salvar Livro</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-info">
            <p>&copy; 2026 Biblioteca Pessoal. Todos os direitos reservados.</p>
            <p class="credits">
                <b>&copy; Desenvolvido por Davi Afonso & Sofia Tresse Pires</b>
                <br>
                <a href="sobre.html"
                    style="color: var(--dourado); text-decoration: none; display: inline-block; margin-top: 8px;">
                    <i class="fas fa-info-circle"></i> Conheça a nossa história
                </a>
            </p>
        </div>
    </footer>

    <script src="../js/livros.js"></script>
</body>

</html>
